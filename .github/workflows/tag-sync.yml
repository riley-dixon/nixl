name: Sync Branch from Upstream

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to sync from upstream'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  sync-branch:
    name: Sync branch from upstream
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Sync branch from upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh repo sync "${GITHUB_REPOSITORY}" --branch "${{ inputs.branch || 'main' }}"
